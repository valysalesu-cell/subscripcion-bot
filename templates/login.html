<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #172033;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        width: min(380px, calc(100vw - 32px));
        background: #ffffff;
        border: 1px solid #dfe5ef;
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 18px 45px rgba(30, 41, 59, 0.12);
      }
      h1 {
        margin: 0 0 20px;
        font-size: 24px;
        line-height: 1.2;
      }
      label {
        display: block;
        font-size: 14px;
        font-weight: 650;
        margin-bottom: 8px;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #bfccdc;
        border-radius: 6px;
        font: inherit;
        padding: 11px 12px;
      }
      button {
        width: 100%;
        margin-top: 16px;
        border: 0;
        border-radius: 6px;
        background: #176b54;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        padding: 11px 14px;
        cursor: pointer;
      }
      .error {
        margin: 0 0 16px;
        border: 1px solid #f3b5ae;
        border-radius: 6px;
        background: #fff1ef;
        color: #9f2d20;
        padding: 10px 12px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Admin Login</h1>
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
      <form method="post" action="/login">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required autofocus>
        <button type="submit">Sign in</button>
      </form>
    </main>
  </body>
</html>
